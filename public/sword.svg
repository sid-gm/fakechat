<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Pixel art sword - Minecraft diamond sword style -->
  <!-- Blade (cyan/teal) -->
  <rect x="6" y="1" width="4" height="1" fill="#00CED1"/>
  <rect x="5" y="2" width="6" height="1" fill="#00CED1"/>
  <rect x="4" y="3" width="8" height="1" fill="#00CED1"/>
  <rect x="3" y="4" width="10" height="1" fill="#00CED1"/>
  <rect x="2" y="5" width="12" height="1" fill="#00CED1"/>
  <rect x="1" y="6" width="14" height="1" fill="#00CED1"/>
  <rect x="1" y="7" width="14" height="1" fill="#00CED1"/>
  <rect x="2" y="8" width="12" height="1" fill="#00CED1"/>
  <rect x="3" y="9" width="10" height="1" fill="#00CED1"/>
  <rect x="4" y="10" width="8" height="1" fill="#00CED1"/>
